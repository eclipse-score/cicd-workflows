name: Disable mandb updates
description: Disables the mandb updates on the system to prevent unnecessary delays during the build process.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        echo "⚙️  Disabling man-db trigger..."
        sudo ln -sf /bin/true /usr/bin/mandb
