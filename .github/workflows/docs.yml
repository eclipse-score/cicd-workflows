name: Documentation Build

on:
  workflow_call:
    inputs:
      retention-days:
        description: "Number of days to retain the artifact"
        required: false
        default: 1
        type: number
      workflow-version:
        description: "Version or branch to checkout"
        required: false
        default: "main"
        type: string
      bazel-target:
        description: "The Bazel target to build (e.g., //docs)"
        required: false
        type: string
        default: "//:docs"
      tests-report-artifact:
        description: "Name of the artifact that contains test reports"
        required: false
        default: ""
        type: string
      deployment_type:
        description: "Type of deployment: legacy or workflow"
        type: string
        required: false
        default: "workflow"
      gh_app_client_id:
        description: "GitHub App Client ID for inter-repo access (not used in public S-CORE)"
        required: false
        default: ""
        type: string
    secrets:
      gh_app_private_key:
        description: "GitHub App Private Key for inter-repo access (not used in public S-CORE)"
        required: false
      token:
        description: "GitHub Token for inter-repo access (not used in public S-CORE)"
        required: false

env:
  CACHE_KEY_PREFIX: bazel-cache

jobs:
  docs-build:
    name: Build Documentation
    runs-on: ${{ vars.runner_labels_ghub_standard_x64 && fromJSON(vars.runner_labels_ghub_standard_x64) || vars.REPO_RUNNER_LABELS && fromJSON(vars.REPO_RUNNER_LABELS) || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Refuse to run on pull_request_target
        if: github.event_name == 'pull_request_target'
        run: |
          echo "This workflow must not be called from pull_request_target."
          echo "That event has write access to repo secrets while checking out fork code,"
          echo "making it unsafe to run bazel on untrusted input."
          echo "Use pull_request or schedule instead."
          exit 1

      - uses: eclipse-score/cicd-actions/inter-repo-access@51883d9cd772bee5b7d139a2e6ffd8aeabca4224 # main branch as of 2026-04-23
        # Hint: if condition cannot access secrets, so we pass them via env
        env:
          HAS_GH_APP_PRIVATE_KEY: ${{ secrets.gh_app_private_key != '' }}
          HAS_TOKEN: ${{ secrets.token != '' }}
        if: ${{ env.HAS_GH_APP_PRIVATE_KEY == 'true' || env.HAS_TOKEN == 'true' }}
        with:
          token: ${{ secrets.token }}
          github-app-client-id: ${{ inputs.gh_app_client_id }}
          github-app-private-key: ${{ secrets.gh_app_private_key }}

      - uses: eclipse-score/more-disk-space@3fac5780033e636b114cf69e891dc19d640855c2 # v1.1.0

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Reuse the token from inter-repo-access action to ensure access to private repos
          persist-credentials: false

      - uses: eclipse-score/cicd-actions/setup-bazel-cache@659dcbed63f6b7fbde88c7850125ea0a0a92f939 # setup-bazel-cache/v0.0.0
        with:
          unique-cache-name: ${{ github.workflow }}-${{ github.job }}

      - name: Build documentation
        run: bazel run //:docs

      - name: Upload documentation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: _build
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: error
