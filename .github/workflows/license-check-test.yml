name: License check test
on:
  # Run from PR branch. When running from a fork, this will not have access to
  # secrets. But it will use the workflow from the branch, so we can see how it
  # behaves before merging.
  pull_request:
    types: [opened, reopened, synchronize]

  # Run on workflow, but from the main branch. This will have access to secrets.
  # Warning: this will by default check out the main branch!
  pull_request_target:
    types: [opened, reopened, synchronize]

  # Run on push to main branch. This will have access to secrets.
  push:
    branches:
      - main

  merge_group:
    types: [checks_requested]

permissions:
  # Allow the workflow to write to comment on the PR
  pull-requests: write

jobs:
  # Note: GitHub will resolve local references, even without explicit checkout of the
  # repository. This seems like a bit of a hack, but it works.

  license-check-no-params:
    uses: ./.github/workflows/license-check.yml

  license-check-with-token:
    uses: ./.github/workflows/license-check.yml
    secrets:
      dash-api-token: ${{ secrets.ECLIPSE_GITLAB_API_TOKEN }}
  
  license-check-with-repo-url:
    uses: ./.github/workflows/license-check.yml
    with:
      repo-url: "${{ github.server_url }}/${{ github.repository }}"
